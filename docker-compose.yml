version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: interpretar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-n8n}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-n8npass}
      POSTGRES_DB: ${POSTGRES_DB:-n8n}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-n8n} -d ${POSTGRES_DB:-n8n}"]
      interval: 10s
      timeout: 5s
      retries: 5

  n8n:
    image: n8nio/n8n:1.89.2
    container_name: interpretar-n8n
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      notebooklm-mcp:
        condition: service_started
    ports:
      - "5678:5678"
    environment:
      N8N_PORT: 5678
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-n8n}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:-n8npass}
      WEBHOOK_URL: ${WEBHOOK_URL:-http://localhost:5678/}
      TZ: ${TZ:-America/Sao_Paulo}
      NOTEBOOKLM_MCP_URL: http://notebooklm-mcp:8000
    volumes:
      - n8n_data:/home/node/.n8n

  notebooklm-mcp:
    build:
      context: ./notebooklm-mcp
    container_name: interpretar-notebooklm-mcp
    restart: unless-stopped
    environment:
      NOTEBOOKLM_API_BASE_URL: ${NOTEBOOKLM_API_BASE_URL:-https://notebooklm.google.com}
      NOTEBOOKLM_API_KEY: ${NOTEBOOKLM_API_KEY:-change-me}
      PORT: 8000
    ports:
      - "8000:8000"

  pwa:
    build:
      context: .
      dockerfile: Dockerfile.pwa
    container_name: interpretar-pwa
    restart: unless-stopped
    depends_on:
      - n8n
    ports:
      - "8080:80"

volumes:
  postgres_data:
  n8n_data:
